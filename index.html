const seeded = (seed) => { let x=Math.sin(seed+1)*10000; return x-Math.floor(x); };

const generateBusinesses = (city, trade, count=60) => {
  const citySlug = city.toLowerCase().replace(/[^a-z]/g,'');
  const tradeSlug = trade.toLowerCase().replace(/[^a-z]/g,'');
  return Array.from({length:count}, (_,i) => {
    const s = i * 137 + citySlug.charCodeAt(0) * 31 + tradeSlug.charCodeAt(0) * 17;
    const fn = pick(FIRST, s+1), ln = pick(LAST, s+2);
    const pat = pick(NAME_PATS, s+3);
    const tradeShort = trade.split('/')[0].split('&')[0].trim();
    const num = Math.floor(seeded(s+4)*8999)+1000;
    const rating = Math.round((3.7+seeded(s+5)*1.3)*10)/10;
    const reviews = Math.floor(seeded(s+6)*990)+10;
    const areaCode = Math.floor(seeded(s+7)*800)+200;
    const phone1 = Math.floor(seeded(s+8)*900)+100;
    const phone2 = Math.floor(seeded(s+9)*9000)+1000;
    return {
      id: `biz-${i}-${citySlug}`,
      name: pat(city.split(',')[0], tradeShort, fn, ln),
      address: `${num} ${pick(STREETS,s+10)}, ${city}`,
      phone: `(${areaCode}) ${phone1}-${phone2}`,
      rating, reviews,
      trade, city,
    };
  });
};

function DiscoverView({onBuild}) {
  const [city,    setCity]    = useState("");
  const [trade,   setTrade]   = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [page,    setPage]    = useState(0);
  const [selected,setSelected]= useState(new Set());
  const [searched,setSearched]= useState(false);

  const PER_PAGE = 20;
  const totalPages = Math.ceil(results.length / PER_PAGE);
  const pageResults = results.slice(page*PER_PAGE, page*PER_PAGE+PER_PAGE);

  const doSearch = () => {
    if(!city.trim()||!trade) return;
    setLoading(true); setSelected(new Set()); setPage(0); setSearched(false);
    setTimeout(()=>{
      setResults(generateBusinesses(city.trim(), trade, 60));
      setLoading(false); setSearched(true);
    }, 1400);
  };

  const toggleSelect = (id) => {
    setSelected(prev=>{
      const s=new Set(prev);
      s.has(id)?s.delete(id):s.add(id); return s;
    });
  };

  const handleBuild = () => {
    const chosen = results.filter(r=>selected.has(r.id));
    if(chosen.length) onBuild(chosen);
  };

  return (
    <div style={{height:"100%",background:"#020617",display:"flex",flexDirection:"column",overflowY:"auto"}}>
      {/* Sub-header */}
      <div style={{padding:"16px 0 14px",textAlign:"center",borderBottom:"1px solid #1e293b"}}>
        <p style={{color:"#94a3b8",fontSize:15,fontWeight:700,margin:0}}>Find businesses to build AI agents for</p>
        <p style={{color:"#475569",fontSize:12,margin:"3px 0 0"}}>Search any city + service type → select businesses → generate agent blueprints</p>
      </div>

      {/* Search Bar */}
      <div style={{padding:"28px 40px",background:"#0f172a",borderBottom:"1px solid #1e293b"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",gap:12,alignItems:"flex-end"}}>
          <div style={{flex:"0 0 220px"}}>
            <label style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>City</label>
            <div style={{position:"relative"}}>
              <MapPin size={14} color="#64748b" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}/>
              <input value={city} onChange={e=>setCity(e.target.value)} placeholder="Austin, TX"
                onKeyDown={e=>e.key==="Enter"&&doSearch()}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 12px 10px 36px",color:"white",fontSize:14,outline:"none"}}/>
            </div>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>Service Type</label>
            <select value={trade} onChange={e=>setTrade(e.target.value)}
              style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 12px",color:trade?"white":"#64748b",fontSize:14,outline:"none"}}>
              <option value="">Select a service type…</option>
              {Object.entries(TRADE_CATS).map(([cat,trades])=>(
                <optgroup key={cat} label={cat}>
                  {trades.map(t=><option key={t} value={t}>{t}</option>)}
                </optgroup>
              ))}
            </select>
          </div>
          <button onClick={doSearch} disabled={!city.trim()||!trade||loading}
            style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"10px 24px",background:city.trim()&&trade?"#6366f1":"#334155",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:600,cursor:city.trim()&&trade?"pointer":"not-allowed"}}>
            {loading?<Spin size={15} className="spin"/>:<Search size={15}/>}
            {loading?"Searching…":"Search"}
          </button>
        </div>
      </div>

      {/* Results */}
      <div style={{flex:1,padding:"24px 40px",maxWidth:900,margin:"0 auto",width:"100%"}}>
        {loading && (
          <div style={{textAlign:"center",padding:"80px 0",color:"#64748b"}}>
            <Spin size={32} className="spin" color="#6366f1" style={{display:"block",margin:"0 auto 16px"}}/>
            <p style={{margin:0}}>Searching for {trade} businesses in {city}…</p>
          </div>
        )}

        {!loading && searched && (
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <p style={{margin:0,color:"#94a3b8",fontSize:14}}>
                Found <strong style={{color:"white"}}>{results.length}</strong> {trade} businesses in <strong style={{color:"white"}}>{city}</strong>
                {selected.size>0 && <> — <strong style={{color:"#818cf8"}}>{selected.size} selected</strong></>}
              </p>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:"#64748b"}}>Page {page+1} of {totalPages}</span>
                <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
                  style={{background:page===0?"#1e293b":"#334155",border:"none",borderRadius:8,padding:"6px 10px",color:page===0?"#475569":"white",cursor:page===0?"not-allowed":"pointer",display:"flex",alignItems:"center"}}>
                  <ArrowL size={14}/>
                </button>
                <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page>=totalPages-1}
                  style={{background:page>=totalPages-1?"#1e293b":"#334155",border:"none",borderRadius:8,padding:"6px 10px",color:page>=totalPages-1?"#475569":"white",cursor:page>=totalPages-1?"not-allowed":"pointer",display:"flex",alignItems:"center"}}>
                  <ArrowR size={14}/>
                </button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}} className="fade-in">
              {pageResults.map(biz=>{
                const sel=selected.has(biz.id);
                return (
                  <div key={biz.id} onClick={()=>toggleSelect(biz.id)}
                    style={{background:sel?"rgba(99,102,241,0.12)":"#0f172a",border:`1px solid ${sel?"#6366f1":"#1e293b"}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",transition:"all 0.15s"}}>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${sel?"#6366f1":"#334155"}`,background:sel?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",marginTop:2,flexShrink:0,transition:"all 0.15s"}}>
                      {sel&&<Check size={11} color="white"/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:"0 0 4px",fontWeight:600,fontSize:14,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{biz.name}</p>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <Stars rating={biz.rating}/>
                        <span style={{fontSize:11,color:"#475569"}}>({biz.reviews} reviews)</span>
                      </div>
                      <p style={{margin:"2px 0",fontSize:12,color:"#64748b",display:"flex",alignItems:"center",gap:5}}>
                        <MapPin size={11} color="#475569"/>{biz.address}
                      </p>
                      <p style={{margin:"2px 0",fontSize:12,color:"#64748b",display:"flex",alignItems:"center",gap:5}}>
                        <Phone size={11} color="#475569"/>{biz.phone}
                      </p>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Pagination row */}
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:24}}>
              {Array.from({length:totalPages},(_,i)=>(
                <button key={i} onClick={()=>setPage(i)}
                  style={{width:32,height:32,borderRadius:8,border:"none",background:page===i?"#6366f1":"#1e293b",color:page===i?"white":"#64748b",cursor:"pointer",fontSize:13,fontWeight:page===i?700:400}}>
                  {i+1}
                </button>
              ))}
            </div>
          </>
        )}

        {!loading && !searched && (
          <div style={{textAlign:"center",padding:"80px 0",color:"#334155"}}>
            <Search size={48} color="#1e293b" style={{display:"block",margin:"0 auto 16px"}}/>
            <p style={{margin:0,fontSize:15}}>Enter a city and service type to find businesses</p>
            <p style={{margin:"8px 0 0",fontSize:13,color:"#1e293b"}}>{ALL_TRADES.length} service types available across 8 categories</p>
          </div>
        )}
      </div>

      {/* Build Button — sticky bottom */}
      {selected.size>0 && (
        <div style={{position:"sticky",bottom:0,background:"rgba(2,6,23,0.95)",backdropFilter:"blur(12px)",borderTop:"1px solid #1e293b",padding:"16px 40px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <p style={{margin:0,fontSize:14,color:"#94a3b8"}}>
            <strong style={{color:"white"}}>{selected.size}</strong> {selected.size===1?"business":"businesses"} selected
          </p>
          <button onClick={handleBuild}
            style={{display:"flex",alignItems:"center",gap:8,padding:"11px 28px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            <Hammer size={15}/> Build Agents for {selected.size} {selected.size===1?"Business":"Businesses"} →
          </button>
        </div>
      )}
    </div>
  );
}

function WorkflowSection({agent,onUpdate}) {
  const [steps,setSteps]=useState(agent.workflow);
  const [editing,setEditing]=useState(null);
  const upd=(u)=>{setSteps(u);onUpdate({workflow:u});};
  const add=()=>{const n={id:mkId(),type:"action",label:"New Step",desc:"",tool:null};const u=[...steps,n];upd(u);setEditing(n.id);};
  const del=(id)=>upd(steps.filter(s=>s.id!==id));
  const patch=(id,p)=>upd(steps.map(s=>s.id===id?{...s,...p}:s));
  const move=(id,d)=>{const i=steps.findIndex(s=>s.id===id);if(i+d<0||i+d>=steps.length)return;const u=[...steps];[u[i],u[i+d]]=[u[i+d],u[i]];upd(u);};
  return (
    <div style={{padding:24,maxWidth:620}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div><p style={{margin:"0 0 2px",fontWeight:600,fontSize:15}}>Workflow Builder</p><p style={{margin:0,fontSize:13,color:"#64748b"}}>Step-by-step flow for this agent</p></div>
        <button onClick={add} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#6366f1",border:"none",borderRadius:8,color:"white",fontSize:13,fontWeight:600,cursor:"pointer"}}><Plus size={13}/>Add Step</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {steps.map((step,i)=>{
          const ti=STEP_TYPES.find(t=>t.id===step.type)||STEP_TYPES[1];
          const isEd=editing===step.id;
          return (
            <div key={step.id}>
              <div style={{background:"#0f172a",border:`1px solid ${isEd?"#6366f1":"#1e293b"}`,borderRadius:12,padding:"12px 14px"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:2}}>
                    <button onClick={()=>move(step.id,-1)} disabled={i===0} style={{background:"none",border:"none",cursor:i===0?"not-allowed":"pointer",color:i===0?"#1e293b":"#64748b",padding:0,display:"flex"}}><ChevU size={13}/></button>
                    <button onClick={()=>move(step.id,1)} disabled={i===steps.length-1} style={{background:"none",border:"none",cursor:i===steps.length-1?"not-allowed":"pointer",color:i===steps.length-1?"#1e293b":"#64748b",padding:0,display:"flex"}}><ChevD size={13}/></button>
                  </div>
                  <div style={{width:30,height:30,borderRadius:8,background:ti.color+"22",border:`1px solid ${ti.color}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <ti.Icon size={14} color={ti.color}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    {isEd?(
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>

                      </div>
                    ):(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>

                          </div>

                        <div style={{display:"flex",gap:4,marginLeft:8}}>
                          <button onClick={()=>setEditing(step.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",padding:4,display:"flex"}}><Edit3 size={12}/></button>

      </div>
    </div>
  );
}

function EvalsSection({agent,onUpdate}) {
  const [evals,setEvals]=useState(agent.evals);
  const [running,setRunning]=useState(false);
  const [nr,setNr]=useState({input:"",expected:""});
  const upd=(u)=>{setEvals(u);onUpdate({evals:u});};
  const add=()=>{if(!nr.input.trim())return;upd([...evals,{id:mkId(),...nr,result:"",status:"pending",score:null}]);setNr({input:"",expected:""}); };
  const del=(id)=>upd(evals.filter(e=>e.id!==id));
  const run=()=>{
    setRunning(true);
    setTimeout(()=>{
      upd(evals.map(e=>e.status==="pending"?{...e,result:`[Simulated] ${e.expected}`,status:"pass",score:Math.floor(Math.random()*25)+75}:e));
      setRunning(false);
    },1800);
  };
  const pass=evals.filter(e=>e.status==="pass").length;
  const fail=evals.filter(e=>e.status==="fail").length;
  const pend=evals.filter(e=>e.status==="pending").length;
  const scored=evals.filter(e=>e.score!==null);
  const avg=scored.length?Math.round(scored.reduce((a,e)=>a+e.score,0)/scored.length):null;
  return (
    <div style={{padding:24,maxWidth:900}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div><p style={{margin:"0 0 2px",fontWeight:600,fontSize:15}}>Eval Tracker</p><p style={{margin:0,fontSize:13,color:"#64748b"}}>Test this agent's behavior before going live</p></div>
        <button onClick={run} disabled={running||pend===0}
          style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:running||pend===0?"#1e293b":"#10b981",border:"none",borderRadius:8,color:running||pend===0?"#64748b":"white",cursor:running||pend===0?"not-allowed":"pointer",fontSize:13,fontWeight:600}}>
          {running?<><Spin size={13} className="spin"/>Running…</>:<><Play size={13}/>Run Pending</>}
        </button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[{l:"Passing",v:pass,c:"#10b981"},{l:"Failing",v:fail,c:"#ef4444"},{l:"Pending",v:pend,c:"#f59e0b"},{l:"Avg Score",v:avg!==null?`${avg}%`:"—",c:"#6366f1"}].map(({l,v,c})=>(
          <div key={l} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"12px",textAlign:"center"}}>
            <p style={{margin:"0 0 2px",fontSize:20,fontWeight:700,color:c}}>{v}</p>
            <p style={{margin:0,fontSize:11,color:"#64748b"}}>{l}</p>
          </div>
        ))}
      </div>
      <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,overflow:"hidden",marginBottom:12}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:"1px solid #1e293b"}}>
            {["Input","Expected","Result","Status","Score",""].map(h=>(
              <th key={h} style={{padding:"10px 12px",textAlign:"left",color:"#475569",fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {evals.map((ev,i)=>(
              <tr key={ev.id} style={{borderBottom:"1px solid #0f172a",background:i%2===1?"#080f1a":"transparent"}}>
                <td style={{padding:"10px 12px",color:"#e2e8f0",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ev.input}>{ev.input}</td>
                <td style={{padding:"10px 12px",color:"#64748b",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ev.expected}>{ev.expected||"—"}</td>
                <td style={{padding:"10px 12px",color:"#64748b",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ev.result}>{ev.result||"—"}</td>
                <td style={{padding:"10px 12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    {statusIcon(ev.status)}<span style={{color:statusColor(ev.status),textTransform:"capitalize"}}>{ev.status}</span>
                  </div>
                </td>
                <td style={{padding:"10px 12px",textAlign:"center"}}>
                  {ev.score!==null?<span style={{fontWeight:700,color:ev.score>=80?"#10b981":ev.score>=60?"#f59e0b":"#ef4444"}}>{ev.score}%</span>:<span style={{color:"#334155"}}>—</span>}
                </td>
                <td style={{padding:"10px 12px"}}>
                  <button onClick={()=>del(ev.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#475569",display:"flex"}}><Trash size={12}/></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {evals.length===0&&<div style={{padding:"40px",textAlign:"center",color:"#334155"}}>No eval cases yet.</div>}
      </div>
      <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"14px 16px",display:"flex",gap:12,alignItems:"flex-end"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Test Input</label>
          <input value={nr.input} onChange={e=>setNr(r=>({...r,input:e.target.value}))} placeholder="User message…"
            style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"white",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Expected Output</label>
          <input value={nr.expected} onChange={e=>setNr(r=>({...r,expected:e.target.value}))} placeholder="What should it say?…"
            style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"white",fontSize:13,outline:"none"}}/>
        </div>
        <button onClick={add} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:"#6366f1",border:"none",borderRadius:8,color:"white",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>
          <Plus size={13}/>Add Test
        </button>
      </div>
    </div>
  );
}

const TABS = [
  {id:"overview",label:"Overview",  Icon:Board   },
  {id:"prompt",  label:"Prompt",    Icon:PenLine },
  {id:"workflow",label:"Workflow",  Icon:Layers  },

  {id:"evals",   label:"Evals",     Icon:Flask   },
];

function WorkspaceView({businesses, allAgents, setAllAgents, onDiscover}) {

  const bizList = useMemo(()=>[...new Map(allAgents.map(a=>[a.bizId,{id:a.bizId,name:a.bizName,trade:a.trade}])).values()],[allAgents]);

  const [activeAgentId, setActiveAgentId] = useState(allAgents[0]?.id);
  const [activeTab, setActiveTab] = useState("overview");
  const [showBuild, setShowBuild] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const bizAgents = allAgents.filter(a=>a.bizId===activeBizId);
  const activeAgent = allAgents.find(a=>a.id===activeAgentId) || bizAgents[0];
  const buildAgents = allAgents.filter(a=>a.bizId===activeBizId);

  useEffect(()=>{
    if(activeBizId && bizAgents.length>0 && !bizAgents.find(a=>a.id===activeAgentId)) {
      setActiveAgentId(bizAgents[0].id);
    }
  },[activeBizId]);

  const updateAgent = (patch) => {
    setAllAgents(prev=>prev.map(a=>a.id===activeAgentId?{...a,...patch}:a));
  };

  return (
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>

            const agts=allAgents.filter(a=>a.bizId===biz.id);
            return (
              <div key={biz.id} style={{marginBottom:4}}>

                  <Bot size={12} color={isActive?"#818cf8":"#475569"}/>
                  <span style={{flex:1,fontSize:12,color:isActive?"white":"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{biz.name}</span>
                </div>

                    <Sparkles size={10} color={activeAgentId===a.id?"#818cf8":"#334155"}/>
                    <span style={{fontSize:11,color:activeAgentId===a.id?"#a5b4fc":"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Top bar */}
        <div style={{borderBottom:"1px solid #1e293b",background:"rgba(10,15,26,0.8)",display:"flex",alignItems:"center",minHeight:48}}>

          <div style={{flex:1}}/>

            <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 12px"}}>

              <button onClick={()=>setShowBuild(true)}
                style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                <Hammer size={13}/> Build It

        {/* Content */}
        <div style={{flex:1,overflowY:"auto"}}>

  "Demo Scheduled":"#8b5cf6","Closed Won":"#10b981","Building":"#6366f1",
};

function PipelineView({businesses, pipeline, setPipeline}) {

  const idx      = stage => PIPE_STAGES.indexOf(stage);

  if(!businesses.length) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:12,color:"#334155"}}>

                <span style={{fontSize:11,color:"#64748b",background:"#1e293b",borderRadius:10,padding:"1px 7px"}}>{bizInStage.length}</span>

              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>

                  <div key={biz.id} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"12px"}}>

function OutreachView({businesses, outreachSent, setOutreachSent, userProfile}) {

    {id:"sms",       label:"SMS",          Icon:Msg},

    {id:"instagram", label:"Instagram",    Icon:Star},

  const sentKey    = (bId,ch) => `${bId}:${ch}`;
  const isSent     = ch => outreachSent.has(sentKey(activeBizId,ch));
  const toggleSent = ch => setOutreachSent(prev=>{
    const s=new Set(prev); const k=sentKey(activeBizId,ch);
    s.has(k)?s.delete(k):s.add(k); return s;

  const GENS = {email:genEmailTemplate,phone:genPhoneScript,sms:genSMSTemplate,linkedin:genLinkedInTemplate,instagram:genInstagramTemplate};

    <div style={{display:"flex",alignItems:"center",borderBottom:"1px solid #1e293b",background:"#080e1b",height:50,flexShrink:0,paddingRight:12}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 14px 0 12px",borderRight:"1px solid #1e293b",marginRight:4,height:"100%"}}>
        <div style={{width:26,height:26,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Cpu size={13} color="white"/>
        </div>
        <span style={{fontWeight:800,fontSize:13,color:"white",whiteSpace:"nowrap"}}>Agent Architect</span>
      </div>

      {/* Tabs */}
      {TABS.map(tab=>{
        const active = mainTab===tab.id;
        const enabled = tab.id==="discover" || hasData;
        return (
          <button key={tab.id} onClick={()=>enabled&&setMainTab(tab.id)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"0 14px",height:"100%",fontSize:12,fontWeight:active?700:400,background:"none",border:"none",cursor:enabled?"pointer":"default",borderBottom:`2px solid ${active?"#6366f1":"transparent"}`,color:active?"white":enabled?"#94a3b8":"#334155",whiteSpace:"nowrap",transition:"color 0.15s"}}>
            <tab.Icon size={12}/>
            {tab.label}
            {tab.id==="agents"&&agentCount>0&&(
              <span style={{fontSize:10,color:"#6366f1",background:"rgba(99,102,241,0.15)",borderRadius:10,padding:"0 5px",marginLeft:2}}>{agentCount}</span>
            )}
            {tab.id==="pipeline"&&hasData&&(
              <span style={{fontSize:10,color:"#64748b",background:"#1e293b",borderRadius:10,padding:"0 5px",marginLeft:2}}>{bizCount}</span>
            )}
          </button>
        );
      })}

      <div style={{flex:1}}/>

      {/* Stats + profile */}
      {hasData&&<span style={{fontSize:11,color:"#334155",marginRight:14}}>{bizCount} biz · {agentCount} agents</span>}
      <button onClick={onProfileClick}
        style={{width:32,height:32,borderRadius:"50%",background:userProfile.name?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e293b",border:"1px solid #334155",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {userProfile.name
          ? <span style={{fontSize:11,fontWeight:700,color:"white"}}>{initials}</span>
          : <Settings size={13} color="#64748b"/>
        }
      </button>
    </div>
  );
}

// ── App Root ────────────────────────────────────────────────────────────────
function App() {
  const [mainTab,      setMainTab]      = useState("discover");
  const [allAgents,    setAllAgents]    = useState([]);
  const [businesses,   setBiz]          = useState([]);
  const [pipeline,     setPipeline]     = useState({});
  const [outreachSent, setOutreachSent] = useState(new Set());
  const [userProfile,  setUserProfile]  = useState({name:"",company:"",email:"",phone:""});
  const [showProfile,  setShowProfile]  = useState(false);

  const handleBuild = (selected) => {
    const newAgents = selected.flatMap(biz=>generateAgents(biz));
    setBiz(prev=>[...prev,...selected.filter(b=>!prev.find(p=>p.id===b.id))]);
    setAllAgents(prev=>[...prev,...newAgents]);
    setPipeline(prev=>{
      const next={...prev};
      selected.forEach(b=>{ if(!next[b.id]) next[b.id]="Discovered"; });
      return next;
    });
    setMainTab("agents");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <TopNav
        mainTab={mainTab}
        setMainTab={setMainTab}
        bizCount={businesses.length}
        agentCount={allAgents.length}
        userProfile={userProfile}
        onProfileClick={()=>setShowProfile(true)}
      />
      <div style={{flex:1,overflow:"hidden"}}>
        {mainTab==="discover"  && <DiscoverView   onBuild={handleBuild}/>}
        {mainTab==="agents"    && <WorkspaceView  businesses={businesses} allAgents={allAgents} setAllAgents={setAllAgents} onDiscover={()=>setMainTab("discover")}/>}
        {mainTab==="outreach"  && <OutreachView   businesses={businesses} outreachSent={outreachSent} setOutreachSent={setOutreachSent} userProfile={userProfile}/>}
        {mainTab==="pipeline"  && <PipelineView   businesses={businesses} pipeline={pipeline} setPipeline={setPipeline}/>}
        {mainTab==="proposal"  && <ProposalView   businesses={businesses} allAgents={allAgents} userProfile={userProfile}/>}
      </div>
      {showProfile && <ProfileModal profile={userProfile} setProfile={setUserProfile} onClose={()=>setShowProfile(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
